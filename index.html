<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florevah — Catálogo</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --rosa:   #f9a8d4;
      --morado: #7c3aed;
      --lila:   #c084fc;
      --crema:  #fff8f5;
      --texto:  #3b1f5e;
      --gris:   #9ca3af;
      --sombra: rgba(124,58,237,0.1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--crema);
      color: var(--texto);
      min-height: 100vh;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background:
        radial-gradient(ellipse at 8% 8%, rgba(249,168,212,0.22) 0%, transparent 45%),
        radial-gradient(ellipse at 92% 92%, rgba(192,132,252,0.18) 0%, transparent 45%),
        radial-gradient(ellipse at 92% 8%, rgba(167,243,208,0.15) 0%, transparent 40%);
      pointer-events:none; z-index:0;
    }
    .contenido { position:relative; z-index:1; }

    /* HEADER */
    header { text-align:center; padding:44px 20px 28px; }
    header::after {
      content:''; display:block; width:140px; height:2px;
      background:linear-gradient(90deg,transparent,var(--lila),var(--rosa),var(--lila),transparent);
      margin:18px auto 0; border-radius:2px;
    }
    .logo-img {
      width:96px; height:96px; border-radius:50%;
      border:3px solid var(--rosa); object-fit:cover;
      margin:0 auto 14px; display:block;
      box-shadow:0 4px 20px rgba(249,168,212,0.4);
    }
    .logo-placeholder {
      width:96px; height:96px; border-radius:50%;
      border:3px solid var(--rosa);
      background:linear-gradient(135deg,#fce7f3,#ede9fe);
      display:flex; align-items:center; justify-content:center;
      font-size:38px; margin:0 auto 14px;
      box-shadow:0 4px 20px rgba(249,168,212,0.4);
    }
    h1.marca {
      font-family:'Great Vibes',cursive;
      font-size:clamp(54px,10vw,82px);
      color:var(--morado); line-height:1;
      text-shadow:2px 3px 0 rgba(249,168,212,0.35);
    }
    .slogan {
      font-size:12px; letter-spacing:3.5px;
      text-transform:uppercase; color:var(--lila);
      margin-top:6px; font-weight:700;
    }

    /* FILTROS */
    .filtros {
      display:flex; gap:8px; justify-content:center;
      flex-wrap:wrap; padding:8px 20px 28px;
    }
    .filtro-btn {
      background:white; border:2px solid var(--rosa);
      border-radius:30px; padding:7px 18px;
      font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
      color:var(--texto); cursor:pointer; transition:all 0.22s ease;
    }
    .filtro-btn:hover, .filtro-btn.activo {
      background:var(--morado); border-color:var(--morado);
      color:white; transform:translateY(-2px);
      box-shadow:0 5px 18px rgba(124,58,237,0.22);
    }

    /* SECCIONES */
    .seccion { max-width:1100px; margin:0 auto 48px; padding:0 20px; }
    .seccion-titulo { display:flex; align-items:center; gap:10px; margin-bottom:22px; }
    .seccion-titulo h2 { font-size:20px; font-weight:800; }
    .seccion-titulo .emoji { font-size:24px; }
    .seccion-titulo::after {
      content:''; flex:1; height:1px;
      background:linear-gradient(90deg,var(--rosa),transparent);
    }

    /* GRID */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:18px; }

    /* TARJETA */
    .tarjeta {
      background:white; border-radius:18px; overflow:hidden;
      border:1.5px solid rgba(249,168,212,0.35);
      box-shadow:0 4px 18px var(--sombra);
      transition:transform 0.28s ease,box-shadow 0.28s ease;
      animation:aparecer 0.45s ease both;
    }
    @keyframes aparecer {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .tarjeta:hover { transform:translateY(-5px); box-shadow:0 14px 36px rgba(124,58,237,0.16); }
    .tarjeta.agotado { opacity:0.58; }

    .tarjeta-img-wrap {
      position:relative; width:100%; aspect-ratio:1/1;
      overflow:hidden; background:linear-gradient(135deg,#fce7f3,#ede9fe);
    }
    .tarjeta-img { width:100%; height:100%; object-fit:cover; display:block; transition:transform 0.35s ease; }
    .tarjeta:hover .tarjeta-img { transform:scale(1.04); }
    .tarjeta-img-placeholder {
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center; font-size:56px;
    }
    .badge-agotado {
      position:absolute; top:10px; right:10px;
      background:rgba(0,0,0,0.55); color:white;
      font-size:10px; font-weight:800; padding:3px 9px;
      border-radius:20px; letter-spacing:1px;
    }

    .tarjeta-body { padding:13px 14px 15px; }
    .tarjeta-nombre { font-size:14px; font-weight:800; color:var(--texto); margin-bottom:4px; }
    .tarjeta-desc { font-size:12px; color:var(--gris); line-height:1.4; margin-bottom:10px; }

    /* CHIPS */
    .colores-wrap { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:11px; }
    .color-chip { font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; border:1.5px solid; }
    .chip-rojo      { background:#fee2e2; color:#991b1b; border-color:#fca5a5; }
    .chip-amarillo  { background:#fef9c3; color:#78350f; border-color:#fde68a; }
    .chip-morado    { background:#ede9fe; color:#5b21b6; border-color:#c4b5fd; }
    .chip-azul      { background:#dbeafe; color:#1e40af; border-color:#93c5fd; }
    .chip-verde     { background:#d1fae5; color:#065f46; border-color:#6ee7b7; }
    .chip-rosa      { background:#fce7f3; color:#9d174d; border-color:#f9a8d4; }
    .chip-rosado    { background:#fce7f3; color:#9d174d; border-color:#f9a8d4; }
    .chip-beige     { background:#fef3c7; color:#92400e; border-color:#fcd34d; }
    .chip-verde-menta { background:#ccfbf1; color:#065f46; border-color:#5eead4; }
    .chip-otros     { background:#f3f4f6; color:#374151; border-color:#d1d5db; }
    .chip-default   { background:#f3f4f6; color:#374151; border-color:#d1d5db; }

    .tarjeta-footer { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .precio { font-size:16px; font-weight:800; color:var(--morado); }
    .btn-pedir {
      background:var(--morado); color:white; border:none;
      border-radius:20px; padding:6px 14px;
      font-family:'Nunito',sans-serif; font-size:12px; font-weight:700;
      cursor:pointer; transition:background 0.2s,transform 0.2s; white-space:nowrap;
    }
    .btn-pedir:hover { background:#6d28d9; transform:scale(1.05); }

    /* ── MODAL CANAL ── */
    .modal-overlay {
      display:none; position:fixed; inset:0; z-index:100;
      background:rgba(30,10,60,0.45);
      backdrop-filter:blur(4px);
      align-items:center; justify-content:center;
    }
    .modal-overlay.abierto { display:flex; }
    .modal {
      background:white; border-radius:24px;
      padding:32px 28px 28px; width:90%; max-width:360px;
      box-shadow:0 20px 60px rgba(124,58,237,0.25);
      animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
      position:relative;
    }
    @keyframes popIn {
      from { opacity:0; transform:scale(0.85); }
      to   { opacity:1; transform:scale(1); }
    }
    .modal-cerrar {
      position:absolute; top:14px; right:16px;
      background:none; border:none; font-size:20px;
      cursor:pointer; color:var(--gris); line-height:1;
    }
    .modal-cerrar:hover { color:var(--texto); }
    .modal-titulo {
      font-family:'Great Vibes',cursive;
      font-size:32px; color:var(--morado);
      text-align:center; margin-bottom:4px;
    }
    .modal-sub {
      text-align:center; font-size:12px; color:var(--gris);
      font-weight:600; letter-spacing:1px; text-transform:uppercase;
      margin-bottom:6px;
    }
    .modal-producto {
      text-align:center; font-size:14px; font-weight:800;
      color:var(--texto); margin-bottom:20px;
      padding:8px 14px; background:#faf5ff;
      border-radius:12px; border:1px solid #ede9fe;
    }
    .modal-label {
      font-size:13px; font-weight:700; color:var(--lila);
      text-align:center; margin-bottom:14px; letter-spacing:0.5px;
    }
    .canal-btn {
      display:flex; align-items:center; gap:14px;
      width:100%; padding:14px 18px; margin-bottom:10px;
      background:linear-gradient(135deg,#fce7f3,#ede9fe);
      border:2px solid transparent; border-radius:16px;
      cursor:pointer; transition:all 0.2s ease;
      text-decoration:none;
    }
    .canal-btn:hover {
      border-color:var(--morado);
      transform:translateY(-2px);
      box-shadow:0 6px 20px rgba(124,58,237,0.18);
    }
    .canal-icon { font-size:28px; flex-shrink:0; }
    .canal-info { text-align:left; }
    .canal-nombre { font-size:13px; font-weight:800; color:var(--morado); }
    .canal-num { font-size:15px; font-weight:800; color:var(--texto); }

    /* FOOTER */
    footer {
      background:white; border-top:2px solid rgba(249,168,212,0.35);
      text-align:center; padding:30px 20px; margin-top:10px;
    }
    .footer-marca { font-family:'Great Vibes',cursive; font-size:36px; color:var(--morado); margin-bottom:6px; }
    .footer-label { font-size:13px; font-weight:700; color:var(--lila); letter-spacing:1px; margin-bottom:12px; }
    .footer-nums { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .footer-nums a {
      display:flex; align-items:center; gap:6px;
      background:linear-gradient(135deg,#fce7f3,#ede9fe);
      color:var(--morado); font-weight:800; font-size:15px;
      padding:9px 22px; border-radius:30px; text-decoration:none;
      transition:transform 0.2s,box-shadow 0.2s;
      box-shadow:0 2px 10px rgba(124,58,237,0.12);
    }
    .footer-nums a:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(124,58,237,0.2); }

    @media (max-width:480px) {
      .grid { grid-template-columns:repeat(2,1fr); gap:10px; }
      .tarjeta-body { padding:9px 10px 11px; }
      .tarjeta-nombre { font-size:12px; }
      .precio { font-size:14px; }
      .btn-pedir { padding:5px 10px; font-size:11px; }
    }
  </style>
</head>
<body>
<div class="contenido">
  <header>
    <div class="logo-placeholder" id="logo-wrap">🌸</div>
    <h1 class="marca" id="marca-nombre">Florevah</h1>
    <p class="slogan" id="marca-slogan">flores artesanales</p>
  </header>
  <div class="filtros" id="filtros"></div>
  <main id="catalogo"></main>
  <footer>
    <div class="footer-marca" id="footer-marca">Florevah</div>
    <p class="footer-label">📱 Pedidos y catálogo</p>
    <div class="footer-nums" id="footer-nums"></div>
  </footer>
</div>

<!-- MODAL SELECCIÓN CANAL -->
<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal">
    <button class="modal-cerrar" onclick="cerrarModal()">✕</button>
    <div class="modal-titulo">Florevah</div>
    <div class="modal-sub">✿ flores artesanales ✿</div>
    <div class="modal-producto" id="modal-producto-nombre"></div>
    <div class="modal-label">¿Por cuál canal nos escribes?</div>
    <a class="canal-btn" id="canal-1" href="#" target="_blank">
      <span class="canal-icon">💬</span>
      <div class="canal-info">
        <div class="canal-nombre">Canal de atención 1</div>
        <div class="canal-num" id="num-canal-1"></div>
      </div>
    </a>
    <a class="canal-btn" id="canal-2" href="#" target="_blank">
      <span class="canal-icon">💬</span>
      <div class="canal-info">
        <div class="canal-nombre">Canal de atención 2</div>
        <div class="canal-num" id="num-canal-2"></div>
      </div>
    </a>
  </div>
</div>

<script>
const CHIP_MAP = {
  'rojo':'chip-rojo','amarillo':'chip-amarillo','morado':'chip-morado',
  'azul':'chip-azul','verde':'chip-verde','rosa':'chip-rosa',
  'rosado':'chip-rosado','beige':'chip-beige',
  'verde menta':'chip-verde-menta','otros':'chip-otros',
};
function chipClass(c){ return CHIP_MAP[c.toLowerCase()] || 'chip-default'; }
function formatPrecio(n){ return '$'+n.toLocaleString('es-CO'); }

let TEL1 = '', TEL2 = '';

// ── MODAL ──
function abrirModal(nombreProducto, precio) {
  const waText = encodeURIComponent(`Hola! Me interesa: *${nombreProducto}* — ${formatPrecio(precio)}`);
  document.getElementById('modal-producto-nombre').textContent = `${nombreProducto} — ${formatPrecio(precio)}`;
  document.getElementById('canal-1').href = `https://wa.me/57${TEL1.replace(/\D/g,'')}?text=${waText}`;
  document.getElementById('canal-2').href = `https://wa.me/57${TEL2.replace(/\D/g,'')}?text=${waText}`;
  document.getElementById('num-canal-1').textContent = TEL1;
  document.getElementById('num-canal-2').textContent = TEL2;
  document.getElementById('modal-overlay').classList.add('abierto');
}
function cerrarModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay') || e.currentTarget.classList.contains('modal-cerrar')) {
    document.getElementById('modal-overlay').classList.remove('abierto');
  }
}
document.addEventListener('keydown', e => { if(e.key==='Escape') cerrarModal({target:document.getElementById('modal-overlay')}); });

// ── CARGAR ──
async function cargarCatalogo() {
  let data;
  try {
    const r = await fetch('catalogo.json');
    if(!r.ok) throw new Error();
    data = await r.json();
  } catch(e) { data = DATOS_EJEMPLO; }
  renderizar(data);
}

function renderizar({ negocio, categorias }) {
  document.title = negocio.nombre + ' — Catálogo';
  document.getElementById('marca-nombre').textContent = negocio.nombre;
  document.getElementById('marca-slogan').textContent = negocio.slogan;
  document.getElementById('footer-marca').textContent = negocio.nombre;
  document.documentElement.style.setProperty('--morado', negocio.color_principal);
  document.documentElement.style.setProperty('--rosa',   negocio.color_acento);
  TEL1 = negocio.telefono1;
  TEL2 = negocio.telefono2;

  const nums = document.getElementById('footer-nums');
  [negocio.telefono1, negocio.telefono2].filter(Boolean).forEach((tel,i) => {
    const a = document.createElement('a');
    a.href = `https://wa.me/57${tel.replace(/\D/g,'')}`;
    a.target = '_blank';
    a.innerHTML = `📱 Canal ${i+1}: ${tel}`;
    nums.appendChild(a);
  });

  const filtros = document.getElementById('filtros');
  filtros.appendChild(mkFiltro('todas','✨ Todos', true));
  categorias.forEach(cat => filtros.appendChild(mkFiltro(cat.id, cat.emoji+' '+cat.nombre)));

  const main = document.getElementById('catalogo');
  categorias.forEach((cat, ci) => {
    const sec = document.createElement('section');
    sec.className='seccion'; sec.dataset.cat=cat.id;
    sec.innerHTML=`<div class="seccion-titulo"><span class="emoji">${cat.emoji}</span><h2>${cat.nombre}</h2></div>`;
    const grid = document.createElement('div');
    grid.className='grid';

    cat.productos.forEach((prod, pi) => {
      const card = document.createElement('div');
      card.className='tarjeta'+(prod.disponible?'':' agotado');
      card.style.animationDelay=(ci*0.08+pi*0.07)+'s';

      const imgHTML = prod.imagen
        ? `<img class="tarjeta-img" src="${prod.imagen}" alt="${prod.nombre}" loading="lazy"
             onerror="this.parentElement.innerHTML='<div class=\\'tarjeta-img-placeholder\\'>${cat.emoji}</div>'">`
        : `<div class="tarjeta-img-placeholder">${cat.emoji}</div>`;

      const chips = (prod.colores||[]).map(c =>
        `<span class="color-chip ${chipClass(c)}">${c}</span>`).join('');

      card.innerHTML = `
        <div class="tarjeta-img-wrap">
          ${!prod.disponible?'<div class="badge-agotado">AGOTADO</div>':''}
          ${imgHTML}
        </div>
        <div class="tarjeta-body">
          <div class="tarjeta-nombre">${prod.nombre}</div>
          <div class="tarjeta-desc">${prod.descripcion}</div>
          ${chips?`<div class="colores-wrap">${chips}</div>`:''}
          <div class="tarjeta-footer">
            <span class="precio">${formatPrecio(prod.precio)}</span>
            ${prod.disponible
              ? `<button class="btn-pedir" onclick="abrirModal('${prod.nombre.replace(/'/g,"\\'")}', ${prod.precio})">Pedir 💬</button>`
              : `<span style="color:var(--gris);font-size:12px;font-weight:700">No disponible</span>`}
          </div>
        </div>`;
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    main.appendChild(sec);
  });
}

function mkFiltro(id, label, activo=false) {
  const btn = document.createElement('button');
  btn.className='filtro-btn'+(activo?' activo':'');
  btn.textContent=label;
  btn.onclick=()=>{
    document.querySelectorAll('.filtro-btn').forEach(b=>b.classList.remove('activo'));
    btn.classList.add('activo');
    document.querySelectorAll('.seccion').forEach(s=>{
      s.style.display=(id==='todas'||s.dataset.cat===id)?'':'none';
    });
  };
  return btn;
}

const DATOS_EJEMPLO = {
  "negocio":{"nombre":"Florevah","slogan":"flores artesanales","telefono1":"318 458 8464","telefono2":"315 816 1746","color_principal":"#7c3aed","color_acento":"#f9a8d4"},
  "categorias":[
    {"id":"ramos","nombre":"Ramos Especiales","emoji":"💐","productos":[
      {"id":1,"nombre":"Ramo rojo","descripcion":"Tulipán y lirio rojo, papel dorado con moño","precio":35000,"imagen":"","colores":[],"disponible":true},
      {"id":2,"nombre":"Ramo azul","descripcion":"Lirio y tulipán azul, papel dorado y moño menta","precio":35000,"imagen":"","colores":[],"disponible":true}
    ]},
    {"id":"maceteros","nombre":"Maceteros","emoji":"🌸","productos":[
      {"id":3,"nombre":"Macetero 3 flores","descripcion":"Macetero tejido con carita feliz y 3 flores","precio":15000,"imagen":"","colores":["Rojo","Morado","Verde","Rosa"],"disponible":true},
      {"id":4,"nombre":"Macetero 4 flores (grande)","descripcion":"Macetero tejido con 4 flores, más grande","precio":18000,"imagen":"","colores":["Amarillo"],"disponible":true},
      {"id":5,"nombre":"Macetero 3 corazones","descripcion":"Macetero con carita feliz y 3 corazones","precio":18000,"imagen":"","colores":["Azul","Verde"],"disponible":true},
      {"id":6,"nombre":"Macetero 4 corazones (grande)","descripcion":"Macetero con 4 corazones, más grande","precio":20000,"imagen":"","colores":["Amarillo"],"disponible":true},
      {"id":7,"nombre":"Macetero Love ❤️","descripcion":"Corazones rojos con letrero 'love'","precio":25000,"imagen":"","colores":["Rojo"],"disponible":true}
    ]},
    {"id":"flores","nombre":"Flores Individuales","emoji":"🌻","productos":[
      {"id":8,"nombre":"Girasol con tarjeta","descripcion":"Girasoles con tarjeta Feliz Día y moño","precio":12000,"imagen":"","colores":[],"disponible":true},
      {"id":9,"nombre":"Gerbera con tarjeta","descripcion":"Gerbera artesanal con tarjeta Feliz Día y moño","precio":12000,"imagen":"","colores":["Azul","Morado","Beige","Rosado"],"disponible":true},
      {"id":10,"nombre":"Flor especial pequeña con tarjeta","descripcion":"Flor artesanal pequeña con tarjeta Feliz Día y moño","precio":8000,"imagen":"","colores":["Rojo","Amarillo","Morado","Otros"],"disponible":true}
    ]}
  ]
};

cargarCatalogo();
</script>
</body>
</html>
