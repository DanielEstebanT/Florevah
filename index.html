<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florevah — Catálogo</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --rosa:   #f9a8d4;
      --morado: #7c3aed;
      --lila:   #c084fc;
      --crema:  #fff8f5;
      --texto:  #3b1f5e;
      --gris:   #9ca3af;
      --sombra: rgba(124,58,237,0.1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Nunito',sans-serif; background:var(--crema); color:var(--texto); min-height:100vh; }
    body::before {
      content:''; position:fixed; inset:0;
      background:
        radial-gradient(ellipse at 8% 8%,rgba(249,168,212,.22) 0%,transparent 45%),
        radial-gradient(ellipse at 92% 92%,rgba(192,132,252,.18) 0%,transparent 45%),
        radial-gradient(ellipse at 92% 8%,rgba(167,243,208,.15) 0%,transparent 40%);
      pointer-events:none; z-index:0;
    }
    .contenido { position:relative; z-index:1; }

    /* HEADER */
    header { text-align:center; padding:44px 20px 28px; }
    header::after {
      content:''; display:block; width:140px; height:2px;
      background:linear-gradient(90deg,transparent,var(--lila),var(--rosa),var(--lila),transparent);
      margin:18px auto 0; border-radius:2px;
    }
    .logo-img {
      width:96px; height:96px; border-radius:50%;
      border:3px solid var(--rosa); object-fit:cover;
      margin:0 auto 14px; display:block;
      box-shadow:0 4px 20px rgba(249,168,212,.4);
    }
    .logo-placeholder {
      width:96px; height:96px; border-radius:50%;
      border:3px solid var(--rosa);
      background:linear-gradient(135deg,#fce7f3,#ede9fe);
      display:flex; align-items:center; justify-content:center;
      font-size:38px; margin:0 auto 14px;
    }
    h1.marca {
      font-family:'Great Vibes',cursive;
      font-size:clamp(54px,10vw,82px);
      color:var(--morado); line-height:1;
      text-shadow:2px 3px 0 rgba(249,168,212,.35);
    }
    .slogan { font-size:12px; letter-spacing:3.5px; text-transform:uppercase; color:var(--lila); margin-top:6px; font-weight:700; }

    /* BANNER INTRO */
    .banner-intro {
      max-width:680px; margin:0 auto 10px;
      padding:14px 28px; text-align:center;
      font-size:14px; font-weight:700; color:#6d28d9;
      background:linear-gradient(135deg,rgba(253,232,243,.8),rgba(237,233,254,.8));
      border:1.5px solid rgba(249,168,212,.5); border-radius:40px;
      letter-spacing:.3px; line-height:1.5;
    }
    .banner-flor { color:var(--rosa); margin:0 6px; font-size:16px; }

    /* FILTROS */
    .filtros { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:8px 20px 28px; }
    .filtro-btn {
      background:white; border:2px solid var(--rosa); border-radius:30px;
      padding:7px 18px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
      color:var(--texto); cursor:pointer; transition:all .22s ease;
    }
    .filtro-btn:hover,.filtro-btn.activo {
      background:var(--morado); border-color:var(--morado); color:white;
      transform:translateY(-2px); box-shadow:0 5px 18px rgba(124,58,237,.22);
    }

    /* SECCIONES */
    .seccion { max-width:1100px; margin:0 auto 48px; padding:0 20px; }
    .seccion-titulo { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
    .seccion-titulo h2 { font-size:20px; font-weight:800; }
    .seccion-titulo .emoji { font-size:24px; }
    .seccion-titulo::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--rosa),transparent); }

    /* BANNER DE SECCIÓN (ej: día del hombre) */
    .seccion-banner {
      display:inline-block;
      background:linear-gradient(135deg,#1a0a0a,#3d0000);
      color:#ff6b6b; font-size:14px; font-weight:800;
      padding:8px 20px; border-radius:30px;
      border:1.5px solid #ff4444;
      margin-bottom:18px;
      letter-spacing:.5px;
    }

    /* GRID */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:18px; }

    /* TARJETA NORMAL */
    .tarjeta {
      background:white; border-radius:18px; overflow:hidden;
      border:1.5px solid rgba(249,168,212,.35);
      box-shadow:0 4px 18px var(--sombra);
      transition:transform .28s ease,box-shadow .28s ease;
      animation:aparecer .45s ease both;
    }
    @keyframes aparecer { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    .tarjeta:hover { transform:translateY(-5px); box-shadow:0 14px 36px rgba(124,58,237,.16); }
    .tarjeta.agotado { opacity:.58; }

    .tarjeta-img-wrap {
      position:relative; width:100%; aspect-ratio:1/1;
      overflow:hidden; background:linear-gradient(135deg,#fce7f3,#ede9fe);
    }
    .tarjeta-img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .35s ease; }
    .tarjeta:hover .tarjeta-img { transform:scale(1.04); }
    .tarjeta-img[src*="ramo_rosa"] { object-position: center 60%; }
    .tarjeta-img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:56px; }
    .badge-agotado {
      position:absolute; top:10px; right:10px;
      background:rgba(0,0,0,.55); color:white;
      font-size:10px; font-weight:800; padding:3px 9px; border-radius:20px;
    }

    .tarjeta-body { padding:13px 14px 15px; }
    .tarjeta-nombre { font-size:14px; font-weight:800; color:var(--texto); margin-bottom:4px; }
    .tarjeta-desc { font-size:12px; color:var(--gris); line-height:1.4; margin-bottom:10px; }

    /* CHIPS */
    .colores-wrap { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:11px; }
    .color-chip { font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; border:1.5px solid; }
    .chip-rojo      { background:#fee2e2; color:#991b1b; border-color:#fca5a5; }
    .chip-amarillo  { background:#fef9c3; color:#78350f; border-color:#fde68a; }
    .chip-morado    { background:#ede9fe; color:#5b21b6; border-color:#c4b5fd; }
    .chip-azul      { background:#dbeafe; color:#1e40af; border-color:#93c5fd; }
    .chip-verde     { background:#d1fae5; color:#065f46; border-color:#6ee7b7; }
    .chip-rosa      { background:#fce7f3; color:#9d174d; border-color:#f9a8d4; }
    .chip-rosado    { background:#fce7f3; color:#9d174d; border-color:#f9a8d4; }
    .chip-beige     { background:#fef3c7; color:#92400e; border-color:#fcd34d; }
    .chip-verde-menta    { background:#ccfbf1; color:#065f46; border-color:#5eead4; }
    .chip-menta          { background:#ccfbf1; color:#065f46; border-color:#5eead4; }
    .chip-lila           { background:#ede9fe; color:#6d28d9; border-color:#a78bfa; }
    .chip-azul-bebe      { background:#e0f2fe; color:#075985; border-color:#7dd3fc; }
    .chip-gris           { background:#f1f5f9; color:#475569; border-color:#cbd5e1; }
    .chip-amarillo-pastel{ background:#fef9c3; color:#a16207; border-color:#fde047; }
    .chip-palo-de-rosa   { background:#fce7f3; color:#9d174d; border-color:#f9a8d4; }
    .chip-personalizado  { background:#f5f3ff; color:#6d28d9; border-color:#c4b5fd; }
    .chip-otros          { background:#f3f4f6; color:#374151; border-color:#d1d5db; }
    .chip-default        { background:#f3f4f6; color:#374151; border-color:#d1d5db; }

    .tarjeta-footer { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .precio { font-size:16px; font-weight:800; color:var(--morado); }
    .btn-pedir {
      background:var(--morado); color:white; border:none; border-radius:20px;
      padding:6px 14px; font-family:'Nunito',sans-serif; font-size:12px; font-weight:700;
      cursor:pointer; transition:background .2s,transform .2s; white-space:nowrap;
    }
    .btn-pedir:hover { background:#6d28d9; transform:scale(1.05); }

    /* ── FLIP CARD para figuras ── */
    .flip-wrap {
      width:100%; aspect-ratio:1/1;
      perspective:1000px;
      cursor:pointer;
      position:relative;
      touch-action:none;
    }
    /* mobile touch flip */
    .flip-wrap.flipped .flip-inner { transform:rotateY(180deg); }
    .flip-wrap.flipped .flip-hint { opacity:0; }
    .flip-inner {
      width:100%; height:100%;
      position:relative;
      transform-style:preserve-3d;
      transition:transform .55s cubic-bezier(.4,0,.2,1);
    }
    .flip-wrap:hover .flip-inner {
      transform:rotateY(180deg);
    }
    .flip-front, .flip-back {
      position:absolute; inset:0;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
    }
    .flip-back { transform:rotateY(180deg); }
    .flip-front img, .flip-back img {
      width:100%; height:100%; object-fit:cover; display:block;
    }
    /* Hint "toca para ver" */
    .flip-hint {
      position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,.55); color:white;
      font-size:10px; font-weight:700; padding:3px 10px;
      border-radius:20px; white-space:nowrap;
      pointer-events:none;
      transition:opacity .3s;
    }
    .flip-wrap:hover .flip-hint { opacity:0; }

    /* Botón ver detalle en flip cards */
    .flip-detalle-btn {
      position:absolute; top:10px; left:10px; z-index:10;
      background:rgba(0,0,0,.45); border:none; border-radius:20px;
      color:white; font-size:11px; font-weight:700;
      padding:5px 10px; cursor:pointer; backdrop-filter:blur(4px);
      transition:background .2s;
    }
    .flip-detalle-btn:hover { background:rgba(124,58,237,.75); }

    /* Tarjeta especial figuras — borde más oscuro */
    .tarjeta-figura {
      border-color:rgba(100,60,200,.3);
      box-shadow:0 4px 20px rgba(100,60,200,.15);
    }
    .tarjeta-figura .precio { color:#dc2626; }
    .tarjeta-figura .btn-pedir { background:#dc2626; }
    .tarjeta-figura .btn-pedir:hover { background:#b91c1c; }

    /* ── MODAL DETALLE PRODUCTO ── */
    .modal-detalle-overlay {
      display:none; position:fixed; inset:0; z-index:200;
      background:rgba(20,5,40,.7); backdrop-filter:blur(6px);
      align-items:center; justify-content:center; padding:16px;
    }
    .modal-detalle-overlay.abierto { display:flex; }
    .modal-detalle {
      background:white; border-radius:24px;
      width:100%; max-width:420px; max-height:90vh;
      overflow-y:auto; position:relative;
      box-shadow:0 24px 70px rgba(124,58,237,.35);
      animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
    }
    body.dark .modal-detalle { background:#1a0a2e; }
    .modal-detalle-img {
      width:100%; aspect-ratio:1/1; object-fit:cover;
      border-radius:24px 24px 0 0; display:block;
    }
    .modal-detalle-img[src*="ramo_rosa"] { object-position: center 60%; }
    .modal-detalle-cerrar {
      position:absolute; top:12px; right:12px;
      background:rgba(0,0,0,.45); border:none; border-radius:50%;
      width:34px; height:34px; font-size:16px; cursor:pointer;
      color:white; display:flex; align-items:center; justify-content:center;
      transition:background .2s;
    }
    .modal-detalle-cerrar:hover { background:rgba(0,0,0,.7); }
    .modal-detalle-body { padding:20px 22px 24px; }
    .modal-detalle-nombre {
      font-size:18px; font-weight:800; color:var(--texto); margin-bottom:6px;
    }
    body.dark .modal-detalle-nombre { color:#f0e6ff; }
    .modal-detalle-desc {
      font-size:13px; color:var(--gris); line-height:1.55; margin-bottom:12px;
    }
    .modal-detalle-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
    .modal-detalle-label {
      font-size:11px; font-weight:800; letter-spacing:1px;
      text-transform:uppercase; color:var(--lila); margin-bottom:8px;
    }
    .modal-detalle-footer {
      display:flex; align-items:center; justify-content:space-between;
      margin-top:4px;
    }
    .modal-detalle-precio { font-size:22px; font-weight:800; color:var(--morado); }

    /* ── MODAL CANAL ── */
    .modal-overlay {
      display:none; position:fixed; inset:0; z-index:100;
      background:rgba(30,10,60,.45); backdrop-filter:blur(4px);
      align-items:center; justify-content:center;
    }
    .modal-overlay.abierto { display:flex; }
    .modal {
      background:white; border-radius:24px; padding:32px 28px 28px;
      width:90%; max-width:360px;
      box-shadow:0 20px 60px rgba(124,58,237,.25);
      animation:popIn .3s cubic-bezier(.34,1.56,.64,1); position:relative;
    }
    @keyframes popIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
    .modal-cerrar { position:absolute; top:14px; right:16px; background:none; border:none; font-size:20px; cursor:pointer; color:var(--gris); }
    .modal-cerrar:hover { color:var(--texto); }

    /* ADICIONALES EN MODAL */
    .adicionales-wrap {
      background: #faf5ff;
      border: 1.5px solid #ede9fe;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    body.dark .adicionales-wrap { background:#2d1b4e; border-color:#4c1d95; }
    .adicionales-titulo {
      font-size: 13px; font-weight: 800;
      color: var(--morado); margin-bottom: 10px;
    }
    .adicional-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(192,132,252,.15);
      cursor: pointer;
    }
    .adicional-item:last-child { border-bottom: none; }
    .adicional-check {
      width: 20px; height: 20px; border-radius: 6px;
      border: 2px solid var(--lila);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .2s;
      background: white;
      font-size: 12px;
    }
    body.dark .adicional-check { background: #1e1040; }
    .adicional-item.seleccionado .adicional-check {
      background: var(--morado); border-color: var(--morado); color: white;
    }
    .adicional-info { flex: 1; }
    .adicional-nombre { font-size: 13px; font-weight: 700; color: var(--texto); }
    body.dark .adicional-nombre { color: #f0e6ff; }
    .adicional-desc { font-size: 11px; color: var(--gris); }
    .adicional-precio {
      font-size: 13px; font-weight: 800; color: var(--morado);
      white-space: nowrap;
    }
    .modal-total {
      margin-top: 12px; padding-top: 10px;
      border-top: 1.5px solid rgba(192,132,252,.25);
      font-size: 15px; font-weight: 800;
      color: var(--texto); text-align: right;
    }
    body.dark .modal-total { color: #f0e6ff; }
    .modal-total span { color: var(--morado); font-size: 18px; }

    .modal-titulo { font-family:'Great Vibes',cursive; font-size:32px; color:var(--morado); text-align:center; margin-bottom:4px; }
    .modal-sub { text-align:center; font-size:12px; color:var(--gris); font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
    .modal-producto { text-align:center; font-size:14px; font-weight:800; color:var(--texto); margin-bottom:20px; padding:8px 14px; background:#faf5ff; border-radius:12px; border:1px solid #ede9fe; }
    .modal-label { font-size:13px; font-weight:700; color:var(--lila); text-align:center; margin-bottom:14px; }
    .canal-btn {
      display:flex; align-items:center; gap:14px; width:100%;
      padding:14px 18px; margin-bottom:10px;
      background:linear-gradient(135deg,#fce7f3,#ede9fe);
      border:2px solid transparent; border-radius:16px;
      cursor:pointer; transition:all .2s ease; text-decoration:none;
    }
    .canal-btn:hover { border-color:var(--morado); transform:translateY(-2px); box-shadow:0 6px 20px rgba(124,58,237,.18); }
    .canal-icon { font-size:28px; flex-shrink:0; }
    .canal-info { text-align:left; }
    .canal-nombre { font-size:13px; font-weight:800; color:var(--morado); }
    .canal-num { font-size:15px; font-weight:800; color:var(--texto); }

    /* POR QUÉ FLOREVAH */
    .porque-section { background:linear-gradient(135deg,#fce7f3,#ede9fe); padding:52px 20px 56px; margin-top:20px; }
    .porque-inner { max-width:900px; margin:0 auto; text-align:center; }
    .porque-titulo { font-size:clamp(22px,5vw,32px); font-weight:800; color:var(--texto); margin-bottom:12px; }
    .porque-titulo span { font-family:'Great Vibes',cursive; font-size:clamp(30px,6vw,44px); color:var(--morado); }
    .porque-frase { font-size:15px; color:#6d28d9; font-style:italic; font-weight:600; margin-bottom:36px; padding:0 20px; line-height:1.6; }
    .porque-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:18px; }
    .porque-card { background:white; border-radius:20px; padding:28px 22px; border:1.5px solid rgba(249,168,212,.4); box-shadow:0 4px 18px rgba(124,58,237,.08); transition:transform .25s,box-shadow .25s; }
    .porque-card:hover { transform:translateY(-5px); box-shadow:0 12px 32px rgba(124,58,237,.15); }
    .porque-icon { font-size:36px; margin-bottom:12px; }
    .porque-card-title { font-size:16px; font-weight:800; color:var(--morado); margin-bottom:8px; }
    .porque-card-desc { font-size:13px; color:var(--gris); line-height:1.5; }

    /* FOOTER */
    footer { background:white; border-top:2px solid rgba(249,168,212,.35); text-align:center; padding:30px 20px; margin-top:10px; }
    .footer-marca { font-family:'Great Vibes',cursive; font-size:36px; color:var(--morado); margin-bottom:6px; }
    .footer-label { font-size:13px; font-weight:700; color:var(--lila); letter-spacing:1px; margin-bottom:12px; }
    .footer-nums { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .footer-nums a {
      display:flex; align-items:center; gap:6px;
      background:linear-gradient(135deg,#fce7f3,#ede9fe);
      color:var(--morado); font-weight:800; font-size:15px;
      padding:9px 22px; border-radius:30px; text-decoration:none;
      transition:transform .2s,box-shadow .2s;
      box-shadow:0 2px 10px rgba(124,58,237,.12);
    }
    .footer-nums a:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(124,58,237,.2); }


    /* ── MODO NOCTURNO ── */
    body.dark {
      --rosa:   #c0608a;
      --morado: #c084fc;
      --lila:   #a855f7;
      --crema:  #1a0f2e;
      --texto:  #f0e6ff;
      --gris:   #8b7aaa;
      --sombra: rgba(192,132,252,0.15);
      background:#1a0f2e; color:#f0e6ff;
    }
    body.dark::before {
      background:
        radial-gradient(ellipse at 8% 8%,rgba(124,58,237,.28) 0%,transparent 50%),
        radial-gradient(ellipse at 92% 92%,rgba(88,28,135,.32) 0%,transparent 50%),
        radial-gradient(ellipse at 92% 8%,rgba(167,139,250,.14) 0%,transparent 40%);
    }
    body.dark .banner-intro { background:linear-gradient(135deg,rgba(88,28,135,.5),rgba(59,7,100,.6)); border-color:rgba(192,132,252,.35); color:#e9d5ff; }
    body.dark .banner-flor { color:#c084fc; }
    body.dark .filtro-btn { background:#2d1b4e; border-color:#7c3aed; color:#e9d5ff; }
    body.dark .filtro-btn:hover, body.dark .filtro-btn.activo { background:#7c3aed; color:white; }
    body.dark .tarjeta { background:#241545; border-color:rgba(167,139,250,.22); }
    body.dark .tarjeta-nombre { color:#f0e6ff; }
    body.dark .tarjeta-img-wrap, body.dark .tarjeta-img-placeholder { background:linear-gradient(135deg,#3b1f5e,#1e1040); }
    body.dark .precio { color:#c084fc; }
    body.dark .btn-pedir { background:#7c3aed; }
    body.dark .tarjeta-figura .precio { color:#f87171; }
    body.dark .tarjeta-figura .btn-pedir { background:#dc2626; }
    body.dark .chip-rojo    { background:#3b0f0f; color:#fca5a5; border-color:#7f1d1d; }
    body.dark .chip-amarillo{ background:#2d1f00; color:#fde68a; border-color:#78350f; }
    body.dark .chip-morado  { background:#2e1065; color:#e9d5ff; border-color:#7c3aed; }
    body.dark .chip-azul    { background:#0f172a; color:#93c5fd; border-color:#1e3a5f; }
    body.dark .chip-verde   { background:#0f2a1a; color:#6ee7b7; border-color:#065f46; }
    body.dark .chip-rosa, body.dark .chip-rosado { background:#3b1040; color:#f0abcf; border-color:#831843; }

      --rosa:   #f9a8d4;
      --morado: #7c3aed;
      --lila:   #c084fc;
      --crema:  #fff8f5;
      --texto:  #3b1f5e;
      --gris:   #9ca3af;
      --sombra: rgba(124,58,237,0.1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Nunito',sans-serif; background:var(--crema); color:var(--texto); min-height:100vh; }
    body::before {
      content:''; position:fixed; inset:0;
      background:
        radial-gradient(ellipse at 8% 8%,rgba(249,168,212,.22) 0%,transparent 45%),
        radial-gradient(ellipse at 92% 92%,rgba(192,132,252,.18) 0%,transparent 45%),
        radial-gradient(ellipse at 92% 8%,rgba(167,243,208,.15) 0%,transparent 40%);
      pointer-events:none; z-index:0;
    }
    .contenido { position:relative; z-index:1; }

    /* HEADER */
    header { text-align:center; padding:44px 20px 28px; }
    header::after {
      content:''; display:block; width:140px; height:2px;
      background:linear-gradient(90deg,transparent,var(--lila),var(--rosa),var(--lila),transparent);
      margin:18px auto 0; border-radius:2px;
    }
    .logo-img {
      width:96px; height:96px; border-radius:50%;
      border:3px solid var(--rosa); object-fit:cover;
      margin:0 auto 14px; display:block;
      box-shadow:0 4px 20px rgba(249,168,212,.4);
    }
    .logo-placeholder {
      width:96px; height:96px; border-radius:50%;
      border:3px solid var(--rosa);
      background:linear-gradient(135deg,#fce7f3,#ede9fe);
      display:flex; align-items:center; justify-content:center;
      font-size:38px; margin:0 auto 14px;
    }
    h1.marca {
      font-family:'Great Vibes',cursive;
      font-size:clamp(54px,10vw,82px);
      color:var(--morado); line-height:1;
      text-shadow:2px 3px 0 rgba(249,168,212,.35);
    }
    .slogan { font-size:12px; letter-spacing:3.5px; text-transform:uppercase; color:var(--lila); margin-top:6px; font-weight:700; }

    /* BANNER INTRO */
    .banner-intro {
      max-width:680px; margin:0 auto 10px;
      padding:14px 28px; text-align:center;
      font-size:14px; font-weight:700; color:#6d28d9;
      background:linear-gradient(135deg,rgba(253,232,243,.8),rgba(237,233,254,.8));
      border:1.5px solid rgba(249,168,212,.5); border-radius:40px;
      letter-spacing:.3px; line-height:1.5;
    }
    .banner-flor { color:var(--rosa); margin:0 6px; font-size:16px; }

    /* FILTROS */
    .filtros { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:8px 20px 28px; }
    .filtro-btn {
      background:white; border:2px solid var(--rosa); border-radius:30px;
      padding:7px 18px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
      color:var(--texto); cursor:pointer; transition:all .22s ease;
    }
    .filtro-btn:hover,.filtro-btn.activo {
      background:var(--morado); border-color:var(--morado); color:white;
      transform:translateY(-2px); box-shadow:0 5px 18px rgba(124,58,237,.22);
    }

    /* SECCIONES */
    .seccion { max-width:1100px; margin:0 auto 48px; padding:0 20px; }
    .seccion-titulo { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
    .seccion-titulo h2 { font-size:20px; font-weight:800; }
    .seccion-titulo .emoji { font-size:24px; }
    .seccion-titulo::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--rosa),transparent); }

    /* BANNER DE SECCIÓN (ej: día del hombre) */
    .seccion-banner {
      display:inline-block;
      background:linear-gradient(135deg,#1a0a0a,#3d0000);
      color:#ff6b6b; font-size:14px; font-weight:800;
      padding:8px 20px; border-radius:30px;
      border:1.5px solid #ff4444;
      margin-bottom:18px;
      letter-spacing:.5px;
    }

    /* GRID */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:18px; }

    /* TARJETA NORMAL */
    .tarjeta {
      background:white; border-radius:18px; overflow:hidden;
      border:1.5px solid rgba(249,168,212,.35);
      box-shadow:0 4px 18px var(--sombra);
      transition:transform .28s ease,box-shadow .28s ease;
      animation:aparecer .45s ease both;
    }
    @keyframes aparecer { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    .tarjeta:hover { transform:translateY(-5px); box-shadow:0 14px 36px rgba(124,58,237,.16); }
    .tarjeta.agotado { opacity:.58; }

    .tarjeta-img-wrap {
      position:relative; width:100%; aspect-ratio:1/1;
      overflow:hidden; background:linear-gradient(135deg,#fce7f3,#ede9fe);
    }
    .tarjeta-img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .35s ease; }
    .tarjeta:hover .tarjeta-img { transform:scale(1.04); }
    .tarjeta-img[src*="ramo_rosa"] { object-position: center 60%; }
    .tarjeta-img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:56px; }
    .badge-agotado {
      position:absolute; top:10px; right:10px;
      background:rgba(0,0,0,.55); color:white;
      font-size:10px; font-weight:800; padding:3px 9px; border-radius:20px;
    }

    .tarjeta-body { padding:13px 14px 15px; }
    .tarjeta-nombre { font-size:14px; font-weight:800; color:var(--texto); margin-bottom:4px; }
    .tarjeta-desc { font-size:12px; color:var(--gris); line-height:1.4; margin-bottom:10px; }

    /* CHIPS */
    .colores-wrap { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:11px; }
    .color-chip { font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; border:1.5px solid; }
    .chip-rojo      { background:#fee2e2; color:#991b1b; border-color:#fca5a5; }
    .chip-amarillo  { background:#fef9c3; color:#78350f; border-color:#fde68a; }
    .chip-morado    { background:#ede9fe; color:#5b21b6; border-color:#c4b5fd; }
    .chip-azul      { background:#dbeafe; color:#1e40af; border-color:#93c5fd; }
    .chip-verde     { background:#d1fae5; color:#065f46; border-color:#6ee7b7; }
    .chip-rosa      { background:#fce7f3; color:#9d174d; border-color:#f9a8d4; }
    .chip-rosado    { background:#fce7f3; color:#9d174d; border-color:#f9a8d4; }
    .chip-beige     { background:#fef3c7; color:#92400e; border-color:#fcd34d; }
    .chip-verde-menta    { background:#ccfbf1; color:#065f46; border-color:#5eead4; }
    .chip-menta          { background:#ccfbf1; color:#065f46; border-color:#5eead4; }
    .chip-lila           { background:#ede9fe; color:#6d28d9; border-color:#a78bfa; }
    .chip-azul-bebe      { background:#e0f2fe; color:#075985; border-color:#7dd3fc; }
    .chip-gris           { background:#f1f5f9; color:#475569; border-color:#cbd5e1; }
    .chip-amarillo-pastel{ background:#fef9c3; color:#a16207; border-color:#fde047; }
    .chip-palo-de-rosa   { background:#fce7f3; color:#9d174d; border-color:#f9a8d4; }
    .chip-personalizado  { background:#f5f3ff; color:#6d28d9; border-color:#c4b5fd; }
    .chip-otros          { background:#f3f4f6; color:#374151; border-color:#d1d5db; }
    .chip-default        { background:#f3f4f6; color:#374151; border-color:#d1d5db; }

    .tarjeta-footer { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .precio { font-size:16px; font-weight:800; color:var(--morado); }
    .btn-pedir {
      background:var(--morado); color:white; border:none; border-radius:20px;
      padding:6px 14px; font-family:'Nunito',sans-serif; font-size:12px; font-weight:700;
      cursor:pointer; transition:background .2s,transform .2s; white-space:nowrap;
    }
    .btn-pedir:hover { background:#6d28d9; transform:scale(1.05); }

    /* ── FLIP CARD para figuras ── */
    .flip-wrap {
      width:100%; aspect-ratio:1/1;
      perspective:1000px;
      cursor:pointer;
      position:relative;
      touch-action:none;
    }
    /* mobile touch flip */
    .flip-wrap.flipped .flip-inner { transform:rotateY(180deg); }
    .flip-wrap.flipped .flip-hint { opacity:0; }
    .flip-inner {
      width:100%; height:100%;
      position:relative;
      transform-style:preserve-3d;
      transition:transform .55s cubic-bezier(.4,0,.2,1);
    }
    .flip-wrap:hover .flip-inner {
      transform:rotateY(180deg);
    }
    .flip-front, .flip-back {
      position:absolute; inset:0;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
    }
    .flip-back { transform:rotateY(180deg); }
    .flip-front img, .flip-back img {
      width:100%; height:100%; object-fit:cover; display:block;
    }
    /* Hint "toca para ver" */
    .flip-hint {
      position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,.55); color:white;
      font-size:10px; font-weight:700; padding:3px 10px;
      border-radius:20px; white-space:nowrap;
      pointer-events:none;
      transition:opacity .3s;
    }
    .flip-wrap:hover .flip-hint { opacity:0; }

    /* Botón ver detalle en flip cards */
    .flip-detalle-btn {
      position:absolute; top:10px; left:10px; z-index:10;
      background:rgba(0,0,0,.45); border:none; border-radius:20px;
      color:white; font-size:11px; font-weight:700;
      padding:5px 10px; cursor:pointer; backdrop-filter:blur(4px);
      transition:background .2s;
    }
    .flip-detalle-btn:hover { background:rgba(124,58,237,.75); }

    /* Tarjeta especial figuras — borde más oscuro */
    .tarjeta-figura {
      border-color:rgba(100,60,200,.3);
      box-shadow:0 4px 20px rgba(100,60,200,.15);
    }
    .tarjeta-figura .precio { color:#dc2626; }
    .tarjeta-figura .btn-pedir { background:#dc2626; }
    .tarjeta-figura .btn-pedir:hover { background:#b91c1c; }

    /* ── MODAL DETALLE PRODUCTO ── */
    .modal-detalle-overlay {
      display:none; position:fixed; inset:0; z-index:200;
      background:rgba(20,5,40,.7); backdrop-filter:blur(6px);
      align-items:center; justify-content:center; padding:16px;
    }
    .modal-detalle-overlay.abierto { display:flex; }
    .modal-detalle {
      background:white; border-radius:24px;
      width:100%; max-width:420px; max-height:90vh;
      overflow-y:auto; position:relative;
      box-shadow:0 24px 70px rgba(124,58,237,.35);
      animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
    }
    body.dark .modal-detalle { background:#1a0a2e; }
    .modal-detalle-img {
      width:100%; aspect-ratio:1/1; object-fit:cover;
      border-radius:24px 24px 0 0; display:block;
    }
    .modal-detalle-img[src*="ramo_rosa"] { object-position: center 60%; }
    .modal-detalle-cerrar {
      position:absolute; top:12px; right:12px;
      background:rgba(0,0,0,.45); border:none; border-radius:50%;
      width:34px; height:34px; font-size:16px; cursor:pointer;
      color:white; display:flex; align-items:center; justify-content:center;
      transition:background .2s;
    }
    .modal-detalle-cerrar:hover { background:rgba(0,0,0,.7); }
    .modal-detalle-body { padding:20px 22px 24px; }
    .modal-detalle-nombre {
      font-size:18px; font-weight:800; color:var(--texto); margin-bottom:6px;
    }
    body.dark .modal-detalle-nombre { color:#f0e6ff; }
    .modal-detalle-desc {
      font-size:13px; color:var(--gris); line-height:1.55; margin-bottom:12px;
    }
    .modal-detalle-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
    .modal-detalle-label {
      font-size:11px; font-weight:800; letter-spacing:1px;
      text-transform:uppercase; color:var(--lila); margin-bottom:8px;
    }
    .modal-detalle-footer {
      display:flex; align-items:center; justify-content:space-between;
      margin-top:4px;
    }
    .modal-detalle-precio { font-size:22px; font-weight:800; color:var(--morado); }

    /* ── MODAL CANAL ── */
    .modal-overlay {
      display:none; position:fixed; inset:0; z-index:100;
      background:rgba(30,10,60,.45); backdrop-filter:blur(4px);
      align-items:center; justify-content:center;
    }
    .modal-overlay.abierto { display:flex; }
    .modal {
      background:white; border-radius:24px; padding:32px 28px 28px;
      width:90%; max-width:360px;
      box-shadow:0 20px 60px rgba(124,58,237,.25);
      animation:popIn .3s cubic-bezier(.34,1.56,.64,1); position:relative;
    }
    @keyframes popIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
    .modal-cerrar { position:absolute; top:14px; right:16px; background:none; border:none; font-size:20px; cursor:pointer; color:var(--gris); }
    .modal-cerrar:hover { color:var(--texto); }

    /* ADICIONALES EN MODAL */
    .adicionales-wrap {
      background: #faf5ff;
      border: 1.5px solid #ede9fe;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    body.dark .adicionales-wrap { background:#2d1b4e; border-color:#4c1d95; }
    .adicionales-titulo {
      font-size: 13px; font-weight: 800;
      color: var(--morado); margin-bottom: 10px;
    }
    .adicional-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(192,132,252,.15);
      cursor: pointer;
    }
    .adicional-item:last-child { border-bottom: none; }
    .adicional-check {
      width: 20px; height: 20px; border-radius: 6px;
      border: 2px solid var(--lila);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .2s;
      background: white;
      font-size: 12px;
    }
    body.dark .adicional-check { background: #1e1040; }
    .adicional-item.seleccionado .adicional-check {
      background: var(--morado); border-color: var(--morado); color: white;
    }
    .adicional-info { flex: 1; }
    .adicional-nombre { font-size: 13px; font-weight: 700; color: var(--texto); }
    body.dark .adicional-nombre { color: #f0e6ff; }
    .adicional-desc { font-size: 11px; color: var(--gris); }
    .adicional-precio {
      font-size: 13px; font-weight: 800; color: var(--morado);
      white-space: nowrap;
    }
    .modal-total {
      margin-top: 12px; padding-top: 10px;
      border-top: 1.5px solid rgba(192,132,252,.25);
      font-size: 15px; font-weight: 800;
      color: var(--texto); text-align: right;
    }
    body.dark .modal-total { color: #f0e6ff; }
    .modal-total span { color: var(--morado); font-size: 18px; }

    .modal-titulo { font-family:'Great Vibes',cursive; font-size:32px; color:var(--morado); text-align:center; margin-bottom:4px; }
    .modal-sub { text-align:center; font-size:12px; color:var(--gris); font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
    .modal-producto { text-align:center; font-size:14px; font-weight:800; color:var(--texto); margin-bottom:20px; padding:8px 14px; background:#faf5ff; border-radius:12px; border:1px solid #ede9fe; }
    .modal-label { font-size:13px; font-weight:700; color:var(--lila); text-align:center; margin-bottom:14px; }
    .canal-btn {
      display:flex; align-items:center; gap:14px; width:100%;
      padding:14px 18px; margin-bottom:10px;
      background:linear-gradient(135deg,#fce7f3,#ede9fe);
      border:2px solid transparent; border-radius:16px;
      cursor:pointer; transition:all .2s ease; text-decoration:none;
    }
    .canal-btn:hover { border-color:var(--morado); transform:translateY(-2px); box-shadow:0 6px 20px rgba(124,58,237,.18); }
    .canal-icon { font-size:28px; flex-shrink:0; }
    .canal-info { text-align:left; }
    .canal-nombre { font-size:13px; font-weight:800; color:var(--morado); }
    .canal-num { font-size:15px; font-weight:800; color:var(--texto); }

    /* POR QUÉ FLOREVAH */
    .porque-section { background:linear-gradient(135deg,#fce7f3,#ede9fe); padding:52px 20px 56px; margin-top:20px; }
    .porque-inner { max-width:900px; margin:0 auto; text-align:center; }
    .porque-titulo { font-size:clamp(22px,5vw,32px); font-weight:800; color:var(--texto); margin-bottom:12px; }
    .porque-titulo span { font-family:'Great Vibes',cursive; font-size:clamp(30px,6vw,44px); color:var(--morado); }
    .porque-frase { font-size:15px; color:#6d28d9; font-style:italic; font-weight:600; margin-bottom:36px; padding:0 20px; line-height:1.6; }
    .porque-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:18px; }
    .porque-card { background:white; border-radius:20px; padding:28px 22px; border:1.5px solid rgba(249,168,212,.4); box-shadow:0 4px 18px rgba(124,58,237,.08); transition:transform .25s,box-shadow .25s; }
    .porque-card:hover { transform:translateY(-5px); box-shadow:0 12px 32px rgba(124,58,237,.15); }
    .porque-icon { font-size:36px; margin-bottom:12px; }
    .porque-card-title { font-size:16px; font-weight:800; color:var(--morado); margin-bottom:8px; }
    .porque-card-desc { font-size:13px; color:var(--gris); line-height:1.5; }

    /* FOOTER */
    footer { background:white; border-top:2px solid rgba(249,168,212,.35); text-align:center; padding:30px 20px; margin-top:10px; }
    .footer-marca { font-family:'Great Vibes',cursive; font-size:36px; color:var(--morado); margin-bottom:6px; }
    .footer-label { font-size:13px; font-weight:700; color:var(--lila); letter-spacing:1px; margin-bottom:12px; }
    .footer-nums { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .footer-nums a {
      display:flex; align-items:center; gap:6px;
      background:linear-gradient(135deg,#fce7f3,#ede9fe);
      color:var(--morado); font-weight:800; font-size:15px;
      padding:9px 22px; border-radius:30px; text-decoration:none;
      transition:transform .2s,box-shadow .2s;
      box-shadow:0 2px 10px rgba(124,58,237,.12);
    }
    .footer-nums a:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(124,58,237,.2); }


    /* ── MODO NOCTURNO ── */
    body.dark {
      --rosa:   #c0608a;
      --morado: #c084fc;
      --lila:   #a855f7;
      --crema:  #1a0f2e;
      --texto:  #f0e6ff;
      --gris:   #8b7aaa;
      --sombra: rgba(192,132,252,0.15);
      background:#1a0f2e; color:#f0e6ff;
    }
    body.dark::before {
      background:
        radial-gradient(ellipse at 8% 8%,rgba(124,58,237,.28) 0%,transparent 50%),
        radial-gradient(ellipse at 92% 92%,rgba(88,28,135,.32) 0%,transparent 50%),
        radial-gradient(ellipse at 92% 8%,rgba(167,139,250,.14) 0%,transparent 40%);
    }
    body.dark .banner-intro { background:linear-gradient(135deg,rgba(88,28,135,.5),rgba(59,7,100,.6)); border-color:rgba(192,132,252,.35); color:#e9d5ff; }
    body.dark .banner-flor { color:#c084fc; }
    body.dark .filtro-btn { background:#2d1b4e; border-color:#7c3aed; color:#e9d5ff; }
    body.dark .filtro-btn:hover, body.dark .filtro-btn.activo { background:#7c3aed; color:white; }
    body.dark .tarjeta { background:#241545; border-color:rgba(167,139,250,.22); }
    body.dark .tarjeta-nombre { color:#f0e6ff; }
    body.dark .tarjeta-img-wrap, body.dark .tarjeta-img-placeholder { background:linear-gradient(135deg,#3b1f5e,#1e1040); }
    body.dark .precio { color:#c084fc; }
    body.dark .btn-pedir { background:#7c3aed; }
    body.dark .tarjeta-figura .precio { color:#f87171; }
    body.dark .tarjeta-figura .btn-pedir { background:#dc2626; }
    body.dark .chip-rojo    { background:#3b0f0f; color:#fca5a5; border-color:#7f1d1d; }
    body.dark .chip-amarillo{ background:#2d1f00; color:#fde68a; border-color:#78350f; }
    body.dark .chip-morado  { background:#2e1065; color:#e9d5ff; border-color:#7c3aed; }
    body.dark .chip-azul    { background:#0f172a; color:#93c5fd; border-color:#1e3a5f; }
    body.dark .chip-verde   { background:#0f2a1a; color:#6ee7b7; border-color:#065f46; }
    body.dark .chip-rosa, body.dark .chip-rosado { background:#3b1040; color:#f0abcf; border-color:#831843; }

      --morado: #7c3aed;

    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Nunito',sans-serif; background:var(--crema); color:var(--texto); min-height:100vh; }
    body::before {
      content:''; position:fixed; inset:0;
      background:
        radial-gradient(ellipse at 8% 8%,rgba(249,168,212,.22) 0%,transparent 45%),
        radial-gradient(ellipse at 92% 92%,rgba(192,132,252,.18) 0%,transparent 45%),
        radial-gradient(ellipse at 92% 8%,rgba(167,243,208,.15) 0%,transparent 40%);
      pointer-events:none; z-index:0;
    }
    .contenido { position:relative; z-index:1; }

    /* HEADER */
    header { text-align:center; padding:44px 20px 28px; }
    header::after {
      content:''; display:block; width:140px; height:2px;
      background:linear-gradient(90deg,transparent,var(--lila),var(--rosa),var(--lila),transparent);
      margin:18px auto 0; border-radius:2px;
    }
    .logo-img {
      width:96px; height:96px; border-radius:50%;
      border:3px solid var(--rosa); object-fit:cover;
      margin:0 auto 14px; display:block;
      box-shadow:0 4px 20px rgba(249,168,212,.4);
    }
    .logo-placeholder {
      width:96px; height:96px; border-radius:50%;
      border:3px solid var(--rosa);
      background:linear-gradient(135deg,#fce7f3,#ede9fe);
      display:flex; align-items:center; justify-content:center;
      font-size:38px; margin:0 auto 14px;
    }
    h1.marca {
      font-family:'Great Vibes',cursive;
      font-size:clamp(54px,10vw,82px);
      color:var(--morado); line-height:1;
      text-shadow:2px 3px 0 rgba(249,168,212,.35);
    }
    .slogan { font-size:12px; letter-spacing:3.5px; text-transform:uppercase; color:var(--lila); margin-top:6px; font-weight:700; }

    /* BANNER INTRO */
    .banner-intro {
      max-width:680px; margin:0 auto 10px;
      padding:14px 28px; text-align:center;
      font-size:14px; font-weight:700; color:#6d28d9;
      background:linear-gradient(135deg,rgba(253,232,243,.8),rgba(237,233,254,.8));
      border:1.5px solid rgba(249,168,212,.5); border-radius:40px;
      letter-spacing:.3px; line-height:1.5;
    }
    .banner-flor { color:var(--rosa); margin:0 6px; font-size:16px; }

    /* FILTROS */
    .filtros { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:8px 20px 28px; }
    .filtro-btn {
      background:white; border:2px solid var(--rosa); border-radius:30px;
      padding:7px 18px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
      color:var(--texto); cursor:pointer; transition:all .22s ease;
    }
    .filtro-btn:hover,.filtro-btn.activo {
      background:var(--morado); border-color:var(--morado); color:white;
      transform:translateY(-2px); box-shadow:0 5px 18px rgba(124,58,237,.22);
    }

    /* SECCIONES */
    .seccion { max-width:1100px; margin:0 auto 48px; padding:0 20px; }
    .seccion-titulo { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
    .seccion-titulo h2 { font-size:20px; font-weight:800; }
    .seccion-titulo .emoji { font-size:24px; }
    .seccion-titulo::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--rosa),transparent); }

    /* BANNER DE SECCIÓN (ej: día del hombre) */
    .seccion-banner {
      display:inline-block;
      background:linear-gradient(135deg,#1a0a0a,#3d0000);
      color:#ff6b6b; font-size:14px; font-weight:800;
      padding:8px 20px; border-radius:30px;
      border:1.5px solid #ff4444;
      margin-bottom:18px;
      letter-spacing:.5px;
    }

    /* GRID */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:18px; }

    /* TARJETA NORMAL */
    .tarjeta {
      background:white; border-radius:18px; overflow:hidden;
      border:1.5px solid rgba(249,168,212,.35);
      box-shadow:0 4px 18px var(--sombra);
      transition:transform .28s ease,box-shadow .28s ease;
      animation:aparecer .45s ease both;
    }
    @keyframes aparecer { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    .tarjeta:hover { transform:translateY(-5px); box-shadow:0 14px 36px rgba(124,58,237,.16); }
    .tarjeta.agotado { opacity:.58; }

    .tarjeta-img-wrap {
      position:relative; width:100%; aspect-ratio:1/1;
      overflow:hidden; background:linear-gradient(135deg,#fce7f3,#ede9fe);
    }
    .tarjeta-img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .35s ease; }
    .tarjeta:hover .tarjeta-img { transform:scale(1.04); }
    .tarjeta-img[src*="ramo_rosa"] { object-position: center 60%; }
    .tarjeta-img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:56px; }
    .badge-agotado {
      position:absolute; top:10px; right:10px;
      background:rgba(0,0,0,.55); color:white;
      font-size:10px; font-weight:800; padding:3px 9px; border-radius:20px;
    }

    .tarjeta-body { padding:13px 14px 15px; }
    .tarjeta-nombre { font-size:14px; font-weight:800; color:var(--texto); margin-bottom:4px; }
    .tarjeta-desc { font-size:12px; color:var(--gris); line-height:1.4; margin-bottom:10px; }

    /* CHIPS */
    .colores-wrap { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:11px; }
    .color-chip { font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; border:1.5px solid; }
    .chip-rojo      { background:#fee2e2; color:#991b1b; border-color:#fca5a5; }
    .chip-amarillo  { background:#fef9c3; color:#78350f; border-color:#fde68a; }
    .chip-morado    { background:#ede9fe; color:#5b21b6; border-color:#c4b5fd; }
    .chip-azul      { background:#dbeafe; color:#1e40af; border-color:#93c5fd; }
    .chip-verde     { background:#d1fae5; color:#065f46; border-color:#6ee7b7; }
    .chip-rosa      { background:#fce7f3; color:#9d174d; border-color:#f9a8d4; }
    .chip-rosado    { background:#fce7f3; color:#9d174d; border-color:#f9a8d4; }
    .chip-beige     { background:#fef3c7; color:#92400e; border-color:#fcd34d; }
    .chip-verde-menta    { background:#ccfbf1; color:#065f46; border-color:#5eead4; }
    .chip-menta          { background:#ccfbf1; color:#065f46; border-color:#5eead4; }
    .chip-lila           { background:#ede9fe; color:#6d28d9; border-color:#a78bfa; }
    .chip-azul-bebe      { background:#e0f2fe; color:#075985; border-color:#7dd3fc; }
    .chip-gris           { background:#f1f5f9; color:#475569; border-color:#cbd5e1; }
    .chip-amarillo-pastel{ background:#fef9c3; color:#a16207; border-color:#fde047; }
    .chip-palo-de-rosa   { background:#fce7f3; color:#9d174d; border-color:#f9a8d4; }
    .chip-personalizado  { background:#f5f3ff; color:#6d28d9; border-color:#c4b5fd; }
    .chip-otros          { background:#f3f4f6; color:#374151; border-color:#d1d5db; }
    .chip-default        { background:#f3f4f6; color:#374151; border-color:#d1d5db; }

    .tarjeta-footer { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .precio { font-size:16px; font-weight:800; color:var(--morado); }
    .btn-pedir {
      background:var(--morado); color:white; border:none; border-radius:20px;
      padding:6px 14px; font-family:'Nunito',sans-serif; font-size:12px; font-weight:700;
      cursor:pointer; transition:background .2s,transform .2s; white-space:nowrap;
    }
    .btn-pedir:hover { background:#6d28d9; transform:scale(1.05); }

    /* ── FLIP CARD para figuras ── */
    .flip-wrap {
      width:100%; aspect-ratio:1/1;
      perspective:1000px;
      cursor:pointer;
      position:relative;
      touch-action:none;
    }
    /* mobile touch flip */
    .flip-wrap.flipped .flip-inner { transform:rotateY(180deg); }
    .flip-wrap.flipped .flip-hint { opacity:0; }
    .flip-inner {
      width:100%; height:100%;
      position:relative;
      transform-style:preserve-3d;
      transition:transform .55s cubic-bezier(.4,0,.2,1);
    }
    .flip-wrap:hover .flip-inner {
      transform:rotateY(180deg);
    }
    .flip-front, .flip-back {
      position:absolute; inset:0;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
    }
    .flip-back { transform:rotateY(180deg); }
    .flip-front img, .flip-back img {
      width:100%; height:100%; object-fit:cover; display:block;
    }
    /* Hint "toca para ver" */
    .flip-hint {
      position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,.55); color:white;
      font-size:10px; font-weight:700; padding:3px 10px;
      border-radius:20px; white-space:nowrap;
      pointer-events:none;
      transition:opacity .3s;
    }
    .flip-wrap:hover .flip-hint { opacity:0; }

    /* Botón ver detalle en flip cards */
    .flip-detalle-btn {
      position:absolute; top:10px; left:10px; z-index:10;
      background:rgba(0,0,0,.45); border:none; border-radius:20px;
      color:white; font-size:11px; font-weight:700;
      padding:5px 10px; cursor:pointer; backdrop-filter:blur(4px);
      transition:background .2s;
    }
    .flip-detalle-btn:hover { background:rgba(124,58,237,.75); }

    /* Tarjeta especial figuras — borde más oscuro */
    .tarjeta-figura {
      border-color:rgba(100,60,200,.3);
      box-shadow:0 4px 20px rgba(100,60,200,.15);
    }
    .tarjeta-figura .precio { color:#dc2626; }
    .tarjeta-figura .btn-pedir { background:#dc2626; }
    .tarjeta-figura .btn-pedir:hover { background:#b91c1c; }

    /* ── MODAL DETALLE PRODUCTO ── */
    .modal-detalle-overlay {
      display:none; position:fixed; inset:0; z-index:200;
      background:rgba(20,5,40,.7); backdrop-filter:blur(6px);
      align-items:center; justify-content:center; padding:16px;
    }
    .modal-detalle-overlay.abierto { display:flex; }
    .modal-detalle {
      background:white; border-radius:24px;
      width:100%; max-width:420px; max-height:90vh;
      overflow-y:auto; position:relative;
      box-shadow:0 24px 70px rgba(124,58,237,.35);
      animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
    }
    body.dark .modal-detalle { background:#1a0a2e; }
    .modal-detalle-img {
      width:100%; aspect-ratio:1/1; object-fit:cover;
      border-radius:24px 24px 0 0; display:block;
    }
    .modal-detalle-img[src*="ramo_rosa"] { object-position: center 60%; }
    .modal-detalle-cerrar {
      position:absolute; top:12px; right:12px;
      background:rgba(0,0,0,.45); border:none; border-radius:50%;
      width:34px; height:34px; font-size:16px; cursor:pointer;
      color:white; display:flex; align-items:center; justify-content:center;
      transition:background .2s;
    }
    .modal-detalle-cerrar:hover { background:rgba(0,0,0,.7); }
    .modal-detalle-body { padding:20px 22px 24px; }
    .modal-detalle-nombre {
      font-size:18px; font-weight:800; color:var(--texto); margin-bottom:6px;
    }
    body.dark .modal-detalle-nombre { color:#f0e6ff; }
    .modal-detalle-desc {
      font-size:13px; color:var(--gris); line-height:1.55; margin-bottom:12px;
    }
    .modal-detalle-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
    .modal-detalle-label {
      font-size:11px; font-weight:800; letter-spacing:1px;
      text-transform:uppercase; color:var(--lila); margin-bottom:8px;
    }
    .modal-detalle-footer {
      display:flex; align-items:center; justify-content:space-between;
      margin-top:4px;
    }
    .modal-detalle-precio { font-size:22px; font-weight:800; color:var(--morado); }

    /* ── MODAL CANAL ── */
    .modal-overlay {
      display:none; position:fixed; inset:0; z-index:100;
      background:rgba(30,10,60,.45); backdrop-filter:blur(4px);
      align-items:center; justify-content:center;
    }
    .modal-overlay.abierto { display:flex; }
    .modal {
      background:white; border-radius:24px; padding:32px 28px 28px;
      width:90%; max-width:360px;
      box-shadow:0 20px 60px rgba(124,58,237,.25);
      animation:popIn .3s cubic-bezier(.34,1.56,.64,1); position:relative;
    }
    @keyframes popIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
    .modal-cerrar { position:absolute; top:14px; right:16px; background:none; border:none; font-size:20px; cursor:pointer; color:var(--gris); }
    .modal-cerrar:hover { color:var(--texto); }

    /* ADICIONALES EN MODAL */
    .adicionales-wrap {
      background: #faf5ff;
      border: 1.5px solid #ede9fe;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    body.dark .adicionales-wrap { background:#2d1b4e; border-color:#4c1d95; }
    .adicionales-titulo {
      font-size: 13px; font-weight: 800;
      color: var(--morado); margin-bottom: 10px;
    }
    .adicional-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(192,132,252,.15);
      cursor: pointer;
    }
    .adicional-item:last-child { border-bottom: none; }
    .adicional-check {
      width: 20px; height: 20px; border-radius: 6px;
      border: 2px solid var(--lila);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .2s;
      background: white;
      font-size: 12px;
    }
    body.dark .adicional-check { background: #1e1040; }
    .adicional-item.seleccionado .adicional-check {
      background: var(--morado); border-color: var(--morado); color: white;
    }
    .adicional-info { flex: 1; }
    .adicional-nombre { font-size: 13px; font-weight: 700; color: var(--texto); }
    body.dark .adicional-nombre { color: #f0e6ff; }
    .adicional-desc { font-size: 11px; color: var(--gris); }
    .adicional-precio {
      font-size: 13px; font-weight: 800; color: var(--morado);
      white-space: nowrap;
    }
    .modal-total {
      margin-top: 12px; padding-top: 10px;
      border-top: 1.5px solid rgba(192,132,252,.25);
      font-size: 15px; font-weight: 800;
      color: var(--texto); text-align: right;
    }
    body.dark .modal-total { color: #f0e6ff; }
    .modal-total span { color: var(--morado); font-size: 18px; }

    .modal-titulo { font-family:'Great Vibes',cursive; font-size:32px; color:var(--morado); text-align:center; margin-bottom:4px; }
    .modal-sub { text-align:center; font-size:12px; color:var(--gris); font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
    .modal-producto { text-align:center; font-size:14px; font-weight:800; color:var(--texto); margin-bottom:20px; padding:8px 14px; background:#faf5ff; border-radius:12px; border:1px solid #ede9fe; }
    .modal-label { font-size:13px; font-weight:700; color:var(--lila); text-align:center; margin-bottom:14px; }
    .canal-btn {
      display:flex; align-items:center; gap:14px; width:100%;
      padding:14px 18px; margin-bottom:10px;
      background:linear-gradient(135deg,#fce7f3,#ede9fe);
      border:2px solid transparent; border-radius:16px;
      cursor:pointer; transition:all .2s ease; text-decoration:none;

    .canal-btn:hover { border-color:var(--morado); transform:translateY(-2px); box-shadow:0 6px 20px rgba(124,58,237,.18); }
    .canal-icon { font-size:28px; flex-shrink:0; }
    .canal-info { text-align:left; }
    .canal-nombre { font-size:13px; font-weight:800; color:var(--morado); }
    .canal-num { font-size:15px; font-weight:800; color:var(--texto); }

    /* POR QUÉ FLOREVAH */
    .porque-section { background:linear-gradient(135deg,#fce7f3,#ede9fe); padding:52px 20px 56px; margin-top:20px; }
    .porque-inner { max-width:900px; margin:0 auto; text-align:center; }
    .porque-titulo { font-size:clamp(22px,5vw,32px); font-weight:800; color:var(--texto); margin-bottom:12px; }
    .porque-titulo span { font-family:'Great Vibes',cursive; font-size:clamp(30px,6vw,44px); color:var(--morado); }
    .porque-frase { font-size:15px; color:#6d28d9; font-style:italic; font-weight:600; margin-bottom:36px; padding:0 20px; line-height:1.6; }
    .porque-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:18px; }
    .porque-card { background:white; border-radius:20px; padding:28px 22px; border:1.5px solid rgba(249,168,212,.4); box-shadow:0 4px 18px rgba(124,58,237,.08); transition:transform .25s,box-shadow .25s; }
    .porque-card:hover { transform:translateY(-5px); box-shadow:0 12px 32px rgba(124,58,237,.15); }
    .porque-icon { font-size:36px; margin-bottom:12px; }
    .porque-card-title { font-size:16px; font-weight:800; color:var(--morado); margin-bottom:8px; }
    .porque-card-desc { font-size:13px; color:var(--gris); line-height:1.5; }

    /* FOOTER */
    footer { background:white; border-top:2px solid rgba(249,168,212,.35); text-align:center; padding:30px 20px; margin-top:10px; }
    .footer-marca { font-family:'Great Vibes',cursive; font-size:36px; color:var(--morado); margin-bottom:6px; }
    .footer-label { font-size:13px; font-weight:700; color:var(--lila); letter-spacing:1px; margin-bottom:12px; }
    .footer-nums { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .footer-nums a {
      display:flex; align-items:center; gap:6px;
      background:linear-gradient(135deg,#fce7f3,#ede9fe);
      color:var(--morado); font-weight:800; font-size:15px;
      padding:9px 22px; border-radius:30px; text-decoration:none;
      transition:transform .2s,box-shadow .2s;
      box-shadow:0 2px 10px rgba(124,58,237,.12);
    }
    .footer-nums a:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(124,58,237,.2); }


    /* ── MODO NOCTURNO ── */

      --rosa:   #c0608a;
      --morado: #c084fc;
      --lila:   #a855f7;
      --crema:  #1a0f2e;

      --gris:   #8b7aaa;

    }

    }

    body.dark .banner-flor { color:#c084fc; }
    body.dark .filtro-btn { background:#2d1b4e; border-color:#7c3aed; color:#e9d5ff; }

    body.dark .tarjeta { background:#241545; border-color:rgba(167,139,250,.22); }
    body.dark .tarjeta-nombre { color:#f0e6ff; }
    body.dark .tarjeta-img-wrap, body.dark .tarjeta-img-placeholder { background:linear-gradient(135deg,#3b1f5e,#1e1040); }
    body.dark .precio { color:#c084fc; }
    body.dark .btn-pedir { background:#7c3aed; }
    body.dark .tarjeta-figura .precio { color:#f87171; }
    body.dark .tarjeta-figura .btn-pedir { background:#dc2626; }

    body.dark .chip-rosa, body.dark .chip-rosado { background:#3b1040; color:#f0abcf; border-color:#831843; }

        radial-gradient(ellipse at 8% 8%,rgba(249,168,212,.22) 0%,transparent 45%),
        radial-gradient(ellipse at 92% 92%,rgba(192,132,252,.18) 0%,transparent 45%),
        radial-gradient(ellipse at 92% 8%,rgba(167,243,208,.15) 0%,transparent 40%);
      pointer-events:none; z-index:0;
    }
    .contenido { position:relative; z-index:1; }

    /* HEADER */
    header { text-align:center; padding:44px 20px 28px; }
    header::after {
      content:''; display:block; width:140px; height:2px;
      background:linear-gradient(90deg,transparent,var(--lila),var(--rosa),var(--lila),transparent);
      margin:18px auto 0; border-radius:2px;
    }
    .logo-img {
      width:96px; height:96px; border-radius:50%;
      border:3px solid var(--rosa); object-fit:cover;
      margin:0 auto 14px; display:block;
      box-shadow:0 4px 20px rgba(249,168,212,.4);
    }
    .logo-placeholder {
      width:96px; height:96px; border-radius:50%;
      border:3px solid var(--rosa);
      background:linear-gradient(135deg,#fce7f3,#ede9fe);
      display:flex; align-items:center; justify-content:center;
      font-size:38px; margin:0 auto 14px;
    }
    h1.marca {
      font-family:'Great Vibes',cursive;
      font-size:clamp(54px,10vw,82px);
      color:var(--morado); line-height:1;
      text-shadow:2px 3px 0 rgba(249,168,212,.35);
    }
    .slogan { font-size:12px; letter-spacing:3.5px; text-transform:uppercase; color:var(--lila); margin-top:6px; font-weight:700; }

    /* BANNER INTRO */
    .banner-intro {
      max-width:680px; margin:0 auto 10px;
      padding:14px 28px; text-align:center;
      font-size:14px; font-weight:700; color:#6d28d9;
      background:linear-gradient(135deg,rgba(253,232,243,.8),rgba(237,233,254,.8));
      border:1.5px solid rgba(249,168,212,.5); border-radius:40px;
      letter-spacing:.3px; line-height:1.5;
    }
    .banner-flor { color:var(--rosa); margin:0 6px; font-size:16px; }

    /* FILTROS */
    .filtros { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:8px 20px 28px; }
    .filtro-btn {
      background:white; border:2px solid var(--rosa); border-radius:30px;
      padding:7px 18px; font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
      color:var(--texto); cursor:pointer; transition:all .22s ease;
    }
    .filtro-btn:hover,.filtro-btn.activo {
      background:var(--morado); border-color:var(--morado); color:white;
      transform:translateY(-2px); box-shadow:0 5px 18px rgba(124,58,237,.22);
    }

    /* SECCIONES */
    .seccion { max-width:1100px; margin:0 auto 48px; padding:0 20px; }
    .seccion-titulo { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
    .seccion-titulo h2 { font-size:20px; font-weight:800; }
    .seccion-titulo .emoji { font-size:24px; }
    .seccion-titulo::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--rosa),transparent); }

    /* BANNER DE SECCIÓN (ej: día del hombre) */
    .seccion-banner {
      display:inline-block;
      background:linear-gradient(135deg,#1a0a0a,#3d0000);
      color:#ff6b6b; font-size:14px; font-weight:800;
      padding:8px 20px; border-radius:30px;
      border:1.5px solid #ff4444;
      margin-bottom:18px;
      letter-spacing:.5px;
    }

    /* GRID */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:18px; }

    /* TARJETA NORMAL */
    .tarjeta {
      background:white; border-radius:18px; overflow:hidden;
      border:1.5px solid rgba(249,168,212,.35);
      box-shadow:0 4px 18px var(--sombra);
      transition:transform .28s ease,box-shadow .28s ease;
      animation:aparecer .45s ease both;
    }
    @keyframes aparecer { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    .tarjeta:hover { transform:translateY(-5px); box-shadow:0 14px 36px rgba(124,58,237,.16); }
    .tarjeta.agotado { opacity:.58; }

    .tarjeta-img-wrap {
      position:relative; width:100%; aspect-ratio:1/1;
      overflow:hidden; background:linear-gradient(135deg,#fce7f3,#ede9fe);
    }
    .tarjeta-img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .35s ease; }
    .tarjeta:hover .tarjeta-img { transform:scale(1.04); }
    .tarjeta-img[src*="ramo_rosa"] { object-position: center 60%; }
    .tarjeta-img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:56px; }
    .badge-agotado {
      position:absolute; top:10px; right:10px;
      background:rgba(0,0,0,.55); color:white;
      font-size:10px; font-weight:800; padding:3px 9px; border-radius:20px;
    }

    .tarjeta-body { padding:13px 14px 15px; }
    .tarjeta-nombre { font-size:14px; font-weight:800; color:var(--texto); margin-bottom:4px; }
    .tarjeta-desc { font-size:12px; color:var(--gris); line-height:1.4; margin-bottom:10px; }

    /* CHIPS */
    .colores-wrap { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:11px; }
    .color-chip { font-size:11px; font-weight:700; padding:2px 9px; border-radius:20px; border:1.5px solid; }
    .chip-rojo      { background:#fee2e2; color:#991b1b; border-color:#fca5a5; }
    .chip-amarillo  { background:#fef9c3; color:#78350f; border-color:#fde68a; }
    .chip-morado    { background:#ede9fe; color:#5b21b6; border-color:#c4b5fd; }
    .chip-azul      { background:#dbeafe; color:#1e40af; border-color:#93c5fd; }
    .chip-verde     { background:#d1fae5; color:#065f46; border-color:#6ee7b7; }
    .chip-rosa      { background:#fce7f3; color:#9d174d; border-color:#f9a8d4; }
    .chip-rosado    { background:#fce7f3; color:#9d174d; border-color:#f9a8d4; }
    .chip-beige     { background:#fef3c7; color:#92400e; border-color:#fcd34d; }
    .chip-verde-menta    { background:#ccfbf1; color:#065f46; border-color:#5eead4; }
    .chip-menta          { background:#ccfbf1; color:#065f46; border-color:#5eead4; }
    .chip-lila           { background:#ede9fe; color:#6d28d9; border-color:#a78bfa; }
    .chip-azul-bebe      { background:#e0f2fe; color:#075985; border-color:#7dd3fc; }
    .chip-gris           { background:#f1f5f9; color:#475569; border-color:#cbd5e1; }
    .chip-amarillo-pastel{ background:#fef9c3; color:#a16207; border-color:#fde047; }
    .chip-palo-de-rosa   { background:#fce7f3; color:#9d174d; border-color:#f9a8d4; }
    .chip-personalizado  { background:#f5f3ff; color:#6d28d9; border-color:#c4b5fd; }
    .chip-otros          { background:#f3f4f6; color:#374151; border-color:#d1d5db; }
    .chip-default        { background:#f3f4f6; color:#374151; border-color:#d1d5db; }

    .tarjeta-footer { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .precio { font-size:16px; font-weight:800; color:var(--morado); }
    .btn-pedir {
      background:var(--morado); color:white; border:none; border-radius:20px;
      padding:6px 14px; font-family:'Nunito',sans-serif; font-size:12px; font-weight:700;
      cursor:pointer; transition:background .2s,transform .2s; white-space:nowrap;
    }
    .btn-pedir:hover { background:#6d28d9; transform:scale(1.05); }

    /* ── FLIP CARD para figuras ── */
    .flip-wrap {
      width:100%; aspect-ratio:1/1;
      perspective:1000px;
      cursor:pointer;
      position:relative;
      touch-action:none;
    }
    /* mobile touch flip */
    .flip-wrap.flipped .flip-inner { transform:rotateY(180deg); }
    .flip-wrap.flipped .flip-hint { opacity:0; }
    .flip-inner {
      width:100%; height:100%;
      position:relative;
      transform-style:preserve-3d;
      transition:transform .55s cubic-bezier(.4,0,.2,1);
    }
    .flip-wrap:hover .flip-inner {
      transform:rotateY(180deg);
    }
    .flip-front, .flip-back {
      position:absolute; inset:0;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
    }
    .flip-back { transform:rotateY(180deg); }
    .flip-front img, .flip-back img {
      width:100%; height:100%; object-fit:cover; display:block;
    }
    /* Hint "toca para ver" */
    .flip-hint {
      position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,.55); color:white;
      font-size:10px; font-weight:700; padding:3px 10px;
      border-radius:20px; white-space:nowrap;
      pointer-events:none;
      transition:opacity .3s;
    }
    .flip-wrap:hover .flip-hint { opacity:0; }

    /* Botón ver detalle en flip cards */
    .flip-detalle-btn {
      position:absolute; top:10px; left:10px; z-index:10;
      background:rgba(0,0,0,.45); border:none; border-radius:20px;
      color:white; font-size:11px; font-weight:700;
      padding:5px 10px; cursor:pointer; backdrop-filter:blur(4px);
      transition:background .2s;
    }
    .flip-detalle-btn:hover { background:rgba(124,58,237,.75); }

    /* Tarjeta especial figuras — borde más oscuro */
    .tarjeta-figura {
      border-color:rgba(100,60,200,.3);
      box-shadow:0 4px 20px rgba(100,60,200,.15);
    }
    .tarjeta-figura .precio { color:#dc2626; }
    .tarjeta-figura .btn-pedir { background:#dc2626; }
    .tarjeta-figura .btn-pedir:hover { background:#b91c1c; }

    /* ── MODAL DETALLE PRODUCTO ── */
    .modal-detalle-overlay {
      display:none; position:fixed; inset:0; z-index:200;
      background:rgba(20,5,40,.7); backdrop-filter:blur(6px);
      align-items:center; justify-content:center; padding:16px;
    }
    .modal-detalle-overlay.abierto { display:flex; }
    .modal-detalle {
      background:white; border-radius:24px;
      width:100%; max-width:420px; max-height:90vh;
      overflow-y:auto; position:relative;
      box-shadow:0 24px 70px rgba(124,58,237,.35);
      animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
    }
    body.dark .modal-detalle { background:#1a0a2e; }
    .modal-detalle-img {
      width:100%; aspect-ratio:1/1; object-fit:cover;
      border-radius:24px 24px 0 0; display:block;
    }
    .modal-detalle-img[src*="ramo_rosa"] { object-position: center 60%; }
    .modal-detalle-cerrar {
      position:absolute; top:12px; right:12px;
      background:rgba(0,0,0,.45); border:none; border-radius:50%;
      width:34px; height:34px; font-size:16px; cursor:pointer;
      color:white; display:flex; align-items:center; justify-content:center;
      transition:background .2s;
    }
    .modal-detalle-cerrar:hover { background:rgba(0,0,0,.7); }
    .modal-detalle-body { padding:20px 22px 24px; }
    .modal-detalle-nombre {
      font-size:18px; font-weight:800; color:var(--texto); margin-bottom:6px;
    }
    body.dark .modal-detalle-nombre { color:#f0e6ff; }
    .modal-detalle-desc {
      font-size:13px; color:var(--gris); line-height:1.55; margin-bottom:12px;
    }
    .modal-detalle-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
    .modal-detalle-label {
      font-size:11px; font-weight:800; letter-spacing:1px;
      text-transform:uppercase; color:var(--lila); margin-bottom:8px;
    }
    .modal-detalle-footer {
      display:flex; align-items:center; justify-content:space-between;
      margin-top:4px;
    }
    .modal-detalle-precio { font-size:22px; font-weight:800; color:var(--morado); }

    /* ── MODAL CANAL ── */
    .modal-overlay {
      display:none; position:fixed; inset:0; z-index:100;
      background:rgba(30,10,60,.45); backdrop-filter:blur(4px);
      align-items:center; justify-content:center;
    }
    .modal-overlay.abierto { display:flex; }
    .modal {
      background:white; border-radius:24px; padding:32px 28px 28px;
      width:90%; max-width:360px;
      box-shadow:0 20px 60px rgba(124,58,237,.25);
      animation:popIn .3s cubic-bezier(.34,1.56,.64,1); position:relative;
    }
    @keyframes popIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }
    .modal-cerrar { position:absolute; top:14px; right:16px; background:none; border:none; font-size:20px; cursor:pointer; color:var(--gris); }
    .modal-cerrar:hover { color:var(--texto); }

    /* ADICIONALES EN MODAL */
    .adicionales-wrap {
      background: #faf5ff;
      border: 1.5px solid #ede9fe;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    body.dark .adicionales-wrap { background:#2d1b4e; border-color:#4c1d95; }
    .adicionales-titulo {
      font-size: 13px; font-weight: 800;
      color: var(--morado); margin-bottom: 10px;
    }
    .adicional-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(192,132,252,.15);
      cursor: pointer;
    }
    .adicional-item:last-child { border-bottom: none; }
    .adicional-check {
      width: 20px; height: 20px; border-radius: 6px;
      border: 2px solid var(--lila);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .2s;
      background: white;
      font-size: 12px;
    }
    body.dark .adicional-check { background: #1e1040; }
    .adicional-item.seleccionado .adicional-check {
      background: var(--morado); border-color: var(--morado); color: white;
    }
    .adicional-info { flex: 1; }
    .adicional-nombre { font-size: 13px; font-weight: 700; color: var(--texto); }
    body.dark .adicional-nombre { color: #f0e6ff; }
    .adicional-desc { font-size: 11px; color: var(--gris); }
    .adicional-precio {
      font-size: 13px; font-weight: 800; color: var(--morado);
      white-space: nowrap;
    }
    .modal-total {
      margin-top: 12px; padding-top: 10px;
      border-top: 1.5px solid rgba(192,132,252,.25);
      font-size: 15px; font-weight: 800;
      color: var(--texto); text-align: right;
    }
    body.dark .modal-total { color: #f0e6ff; }
    .modal-total span { color: var(--morado); font-size: 18px; }

    .modal-titulo { font-family:'Great Vibes',cursive; font-size:32px; color:var(--morado); text-align:center; margin-bottom:4px; }
    .modal-sub { text-align:center; font-size:12px; color:var(--gris); font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
    .modal-producto { text-align:center; font-size:14px; font-weight:800; color:var(--texto); margin-bottom:20px; padding:8px 14px; background:#faf5ff; border-radius:12px; border:1px solid #ede9fe; }
    .modal-label { font-size:13px; font-weight:700; color:var(--lila); text-align:center; margin-bottom:14px; }
    .canal-btn {
      display:flex; align-items:center; gap:14px; width:100%;
      padding:14px 18px; margin-bottom:10px;
      background:linear-gradient(135deg,#fce7f3,#ede9fe);
      border:2px solid transparent; border-radius:16px;
      cursor:pointer; transition:all .2s ease; text-decoration:none;
    }
    .canal-btn:hover { border-color:var(--morado); transform:translateY(-2px); box-shadow:0 6px 20px rgba(124,58,237,.18); }
    .canal-icon { font-size:28px; flex-shrink:0; }
    .canal-info { text-align:left; }
    .canal-nombre { font-size:13px; font-weight:800; color:var(--morado); }
    .canal-num { font-size:15px; font-weight:800; color:var(--texto); }

    /* POR QUÉ FLOREVAH */
    .porque-section { background:linear-gradient(135deg,#fce7f3,#ede9fe); padding:52px 20px 56px; margin-top:20px; }
    .porque-inner { max-width:900px; margin:0 auto; text-align:center; }
    .porque-titulo { font-size:clamp(22px,5vw,32px); font-weight:800; color:var(--texto); margin-bottom:12px; }
    .porque-titulo span { font-family:'Great Vibes',cursive; font-size:clamp(30px,6vw,44px); color:var(--morado); }
    .porque-frase { font-size:15px; color:#6d28d9; font-style:italic; font-weight:600; margin-bottom:36px; padding:0 20px; line-height:1.6; }
    .porque-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:18px; }
    .porque-card { background:white; border-radius:20px; padding:28px 22px; border:1.5px solid rgba(249,168,212,.4); box-shadow:0 4px 18px rgba(124,58,237,.08); transition:transform .25s,box-shadow .25s; }
    .porque-card:hover { transform:translateY(-5px); box-shadow:0 12px 32px rgba(124,58,237,.15); }
    .porque-icon { font-size:36px; margin-bottom:12px; }
    .porque-card-title { font-size:16px; font-weight:800; color:var(--morado); margin-bottom:8px; }
    .porque-card-desc { font-size:13px; color:var(--gris); line-height:1.5; }

    /* FOOTER */
    footer { background:white; border-top:2px solid rgba(249,168,212,.35); text-align:center; padding:30px 20px; margin-top:10px; }
    .footer-marca { font-family:'Great Vibes',cursive; font-size:36px; color:var(--morado); margin-bottom:6px; }
    .footer-label { font-size:13px; font-weight:700; color:var(--lila); letter-spacing:1px; margin-bottom:12px; }
    .footer-nums { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
    .footer-nums a {
      display:flex; align-items:center; gap:6px;
      background:linear-gradient(135deg,#fce7f3,#ede9fe);
      color:var(--morado); font-weight:800; font-size:15px;
      padding:9px 22px; border-radius:30px; text-decoration:none;
      transition:transform .2s,box-shadow .2s;
      box-shadow:0 2px 10px rgba(124,58,237,.12);
    }
    .footer-nums a:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(124,58,237,.2); }


    /* ── MODO NOCTURNO ── */
    body.dark {
      --rosa:   #c0608a;
      --morado: #c084fc;
      --lila:   #a855f7;
      --crema:  #1a0f2e;
      --texto:  #f0e6ff;
      --gris:   #8b7aaa;
      --sombra: rgba(192,132,252,0.15);
      background:#1a0f2e; color:#f0e6ff;
    }
    body.dark::before {
      background:
        radial-gradient(ellipse at 8% 8%,rgba(124,58,237,.28) 0%,transparent 50%),
        radial-gradient(ellipse at 92% 92%,rgba(88,28,135,.32) 0%,transparent 50%),
        radial-gradient(ellipse at 92% 8%,rgba(167,139,250,.14) 0%,transparent 40%);
    }
    body.dark .banner-intro { background:linear-gradient(135deg,rgba(88,28,135,.5),rgba(59,7,100,.6)); border-color:rgba(192,132,252,.35); color:#e9d5ff; }
    body.dark .banner-flor { color:#c084fc; }
    body.dark .filtro-btn { background:#2d1b4e; border-color:#7c3aed; color:#e9d5ff; }
    body.dark .filtro-btn:hover, body.dark .filtro-btn.activo { background:#7c3aed; color:white; }
    body.dark .tarjeta { background:#241545; border-color:rgba(167,139,250,.22); }
    body.dark .tarjeta-nombre { color:#f0e6ff; }
    body.dark .tarjeta-img-wrap, body.dark .tarjeta-img-placeholder { background:linear-gradient(135deg,#3b1f5e,#1e1040); }
    body.dark .precio { color:#c084fc; }
    body.dark .btn-pedir { background:#7c3aed; }
    body.dark .tarjeta-figura .precio { color:#f87171; }
    body.dark .tarjeta-figura .btn-pedir { background:#dc2626; }
    body.dark .chip-rojo    { background:#3b0f0f; color:#fca5a5; border-color:#7f1d1d; }
    body.dark .chip-amarillo{ background:#2d1f00; color:#fde68a; border-color:#78350f; }
    body.dark .chip-morado  { background:#2e1065; color:#e9d5ff; border-color:#7c3aed; }
    body.dark .chip-azul    { background:#0f172a; color:#93c5fd; border-color:#1e3a5f; }
    body.dark .chip-verde   { background:#0f2a1a; color:#6ee7b7; border-color:#065f46; }
    body.dark .chip-rosa, body.dark .chip-rosado { background:#3b1040; color:#f0abcf; border-color:#831843; }
    body.dark .chip-beige   { background:#2a1a00; color:#fcd34d; bord
